name: CI

on:
  push:
    branches-ignore:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Phase 1: Quality ──────────────────────────────────────────────────────

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint:ci

  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

  prisma-validate:
    name: Prisma schema
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql://inversora:inversora@localhost:5432/inversora

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Prisma schema
        run: npx prisma validate

  build:
    name: Build
    needs: [lint, prisma-validate]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile application
        run: npm run build

  # ── Phase 2: Tests ──────────────────────────────────────────────────────────

  agent-service-tests:
    name: SORA agent service tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install agent service dependencies
        working-directory: agent-service
        run: python -m pip install -e ".[dev]"

      - name: Run agent service tests
        working-directory: agent-service
        run: pytest

  unit-tests:
    name: Unit tests
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npm run test:ci

      - name: Upload unit test coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: coverage/
          retention-days: 7
          if-no-files-found: error

  integration-tests:
    name: Integration tests
    needs: build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: inversora
          POSTGRES_PASSWORD: inversora
          POSTGRES_DB: inversora
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U inversora -d inversora"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://inversora:inversora@localhost:5432/inversora
      POSTGRES_USER: inversora
      POSTGRES_PASSWORD: inversora
      POSTGRES_DB: inversora
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      FMP_API_KEY: integration-test-fmp-key
      FMP_DATA_SOURCE: mock
      FMP_SAVE_FIXTURES: false
      SYNC_SCHEDULER_ENABLED: false

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply database migrations
        run: npm run prisma:migrate:deploy

      - name: Run integration tests
        run: npm run test:integration:ci

  # ── Phase 3: Report ─────────────────────────────────────────────────────────

  report:
    name: Test report
    needs: [agent-service-tests, unit-tests, integration-tests]
    if: always() && !cancelled()
    runs-on: ubuntu-latest

    steps:
      - name: Download unit test coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-unit
          path: coverage
        continue-on-error: true

      - name: Publish job summary
        env:
          UNIT_RESULT: ${{ needs.unit-tests.result }}
          INTEGRATION_RESULT: ${{ needs.integration-tests.result }}
          AGENT_RESULT: ${{ needs.agent-service-tests.result }}
        run: |
          {
            echo "## CI test report"
            echo ""
            echo "| Job | Result |"
            echo "| --- | --- |"
            echo "| Unit tests | ${UNIT_RESULT} |"
            echo "| Integration tests | ${INTEGRATION_RESULT} |"
            echo "| SORA agent service | ${AGENT_RESULT} |"
            echo ""
          } >> "${GITHUB_STEP_SUMMARY}"

          if [ -f coverage/coverage-summary.json ]; then
          node <<'EOF' >> "${GITHUB_STEP_SUMMARY}"
          const fs = require('node:fs');
          const summary = JSON.parse(
            fs.readFileSync('coverage/coverage-summary.json', 'utf8'),
          ).total;

          console.log('### Unit test coverage');
          console.log('');
          console.log('| Metric | Covered % |');
          console.log('| --- | --- |');
          for (const [metric, value] of Object.entries(summary)) {
            console.log(`| ${metric} | ${value.pct}% |`);
          }
          console.log('');
          EOF
          fi

      - name: Enforce test job results
        if: needs.agent-service-tests.result != 'success' || needs.unit-tests.result != 'success' || needs.integration-tests.result != 'success'
        run: exit 1
