name: Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npm run test:cov

  integration-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: inversora
          POSTGRES_PASSWORD: inversora
          POSTGRES_DB: inversora_integration_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U inversora -d inversora_integration_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://inversora:inversora@localhost:5432/inversora_integration_test
      POSTGRES_USER: inversora
      POSTGRES_PASSWORD: inversora
      POSTGRES_DB: inversora_integration_test
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      FMP_API_KEY: integration-test-fmp-key

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply database migrations
        run: npm run prisma:migrate:deploy

      - name: Run integration tests
        run: npm run test:integration
