services:
  postgres:
    image: postgres:16-alpine
    container_name: inversora-postgres
    restart: unless-stopped
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-inversora}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-inversora}
      POSTGRES_DB: ${POSTGRES_DB:-inversora}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-inversora} -d ${POSTGRES_DB:-inversora}',
        ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
