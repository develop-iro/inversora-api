services:
  postgres:
    image: postgres:16-alpine
    container_name: inversora-postgres
    restart: unless-stopped
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-inversora}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD for local Docker Postgres}
      POSTGRES_DB: ${POSTGRES_DB:-inversora}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-inversora} -d ${POSTGRES_DB:-inversora}',
        ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  assistant-agent:
    profiles:
      - agent
    build:
      context: ./agent-service
    container_name: inversora-assistant-agent
    restart: unless-stopped
    ports:
      - '${SORA_AGENT_PORT:-8001}:8001'
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_AGENT_MODEL: ${OPENAI_AGENT_MODEL:-gpt-4o-mini}
      SORA_BACKEND_BASE_URL: ${SORA_BACKEND_BASE_URL:-http://host.docker.internal:3000}
      SORA_INTERNAL_API_KEY: ${SORA_INTERNAL_API_KEY:-}
      ASSISTANT_AGENT_API_KEY: ${ASSISTANT_AGENT_API_KEY:-}
      SORA_AGENT_API_KEY: ${ASSISTANT_AGENT_API_KEY:-}

volumes:
  postgres_data:
